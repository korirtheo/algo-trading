services:
  algotrader:
    build: .
    container_name: algotrader
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
